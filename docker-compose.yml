# ── Trading Journal — Docker Compose ─────────────────────────────────────────
# Orchestrates the backend API and (optionally) a PostgreSQL database.
#
# Usage:
#   docker compose up -d
#     Start backend only with SQLite.
#
#   DATABASE_URL=postgresql://trading_journal:change-me@db:5432/trading_journal docker compose --profile db up -d
#     Start backend + PostgreSQL. Replace credentials before production.
#
# Environment variables are read from the shell or a repo-root .env file.

services:

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/trades.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-dev-secret-before-deployment}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - APP_ENV=${APP_ENV:-development}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── PostgreSQL (optional — enabled with --profile db) ────────────────────
  db:
    profiles:
      - db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_journal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-trading_journal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_journal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  backend_data:
  postgres_data:
